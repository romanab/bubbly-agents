# Example profile — documented template for all options.
# Copy this directory and modify to create your own profile.

[meta]
# Human-readable description of this profile's purpose.
description = Example sandbox profile (fully documented template)

[user]
# GECOS comment field for the user account.
comment     = Example sandbox account

# Set to true to omit /usr from the sandbox. Maximally restrictive.
# Without /usr, most binaries won't work unless explicitly installed.
no-usr      = false

# Set to true to mount /etc and /run read-only into the sandbox.
# Needed for apps that read system config (resolv.conf, nsswitch.conf, etc).
sys-dirs    = false

# Network access mode inside the sandbox. Options:
#   full     — unrestricted network access (default)
#   loopback — loopback (lo) only; no outbound or inbound external traffic
#   none     — no network namespace at all
# Example: network = loopback
# network   = full

# Max number of processes the user may have (ulimit -u).
# Example: max-procs = 50
# max-procs  =

# Max file size the user may create, in MB (ulimit -f).
# Example: max-fsize = 512
# max-fsize  =

# Max number of open file descriptors (ulimit -n).
# Example: max-nofile = 256
# max-nofile =

# Hard memory cap enforced via systemd cgroup (requires systemd user session).
# Example: cgroup-mem = 512M
# cgroup-mem =

# CPU quota enforced via systemd cgroup (requires systemd user session).
# Example: cgroup-cpu = 50%
# cgroup-cpu =

[sandbox]
# Extra bind mounts. Multiple entries are allowed.
# Read-write:   bind    = /src:/dest    or  bind = /path  (same src and dest)
# Read-only:    ro-bind = /src:/dest    or  bind = /src:/dest:ro
#
# Tip: mount a full tool tree so internal symlinks resolve, e.g.:
# ro-bind = /home/linuxbrew/.linuxbrew:/home/linuxbrew/.linuxbrew

# Custom hostname inside the sandbox. Default: sandbox-<username>
hostname    =

[shadow]
# Paths to overlay with a per-user writable layer.
# Each path listed here will be an overlay inside the sandbox:
#   - Reads see both the host content and any files the user has written.
#   - Writes go to $USER_HOME/shadow<path>/ (user-owned).
# The host path is NOT modified.
# If the host path doesn't exist, a plain bind of an empty dir is used.
#
# Example:
# /usr/local

[install]
# Binaries (with all ldd library dependencies) to install into the sandbox.
# Format: host-path[:dest-path-in-sandbox]
# If dest is omitted, installs to /usr/local/bin/<basename>.
# All libraries land at their original host paths (overlaid on top).
# A /usr/local shadow is automatically created if any install is declared.
#
# Example:
# /usr/bin/jq
# /usr/bin/curl:/usr/local/bin/curl

[dotfiles]
# Files from profiles/example/dotfiles/ to copy to $USER_HOME/.
# Each line is a filename relative to the dotfiles/ directory.
.bash_profile
.bashrc

[scripts]
# post-setup: run as root after user creation (outside sandbox).
# Useful for additional system configuration.
# post-setup = post-setup.sh

# on-enter: sourced inside the sandbox on every login (via .bashrc).
# Copied to $USER_HOME/.sandbox-enter.
# on-enter = on-enter.sh
