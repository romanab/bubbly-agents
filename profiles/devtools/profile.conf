# Devtools sandbox profile — developer workbench.
# Includes /etc and /run, shadows /usr/local for writing,
# installs curl and python3 with all their library deps.

[meta]
description = Developer tools sandbox with curl and python3

[user]
comment     = Developer sandbox account
no-usr      = false
sys-dirs    = true
network     = loopback
max-procs   = 100
max-fsize   = 512
max-nofile  = 512
cgroup-mem  = 1G
cgroup-cpu  = 80%

[sandbox]
hostname    =

[shadow]
/usr/local

[install]
/usr/bin/python3
/usr/bin/curl

[dotfiles]
.bashrc

[scripts]
