# activate-venv-via-direnv — sandbox user that hosts a git repo with a Python venv.
# direnv auto-activates the venv when entering the project directory.
#
# Requires:
#   - /usr for git, python3, and standard tooling
#   - sys-dirs = true for real /etc (git SSL cert verification, DNS)
#   - /home/linuxbrew bind-mounted for direnv (installed via Homebrew)
#   - full network for git push/pull to remote repos
#
# After applying, the user must run once inside the sandbox:
#   direnv allow ~/OpenJarvis   (or whatever the repo directory is named)

[meta]
description = Python git-repo sandbox with direnv venv auto-activation

[user]
comment     = Python repo sandbox account
no-usr      = false
sys-dirs    = true
network     = full

[sandbox]
hostname    =
ro-bind     = /home/linuxbrew:/home/linuxbrew

[shadow]

[install]

[dotfiles]
.bash_profile
.bashrc

[scripts]
